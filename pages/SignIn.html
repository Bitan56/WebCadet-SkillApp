<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../stylesheets/Signup.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Document</title>
</head>

<body>

    <a href="../index.html" class="home-btn"><span><i class="ri-arrow-left-line"></i></span>Back to Home</a href="../index.html">

    <div class="title">SignIn Form</div>

    <form id="form" method="POST">
        <input type="text" class="form-input" id="username" name="username" placeholder="Enter Your Username"
            required />

        <div class="input-container">
            <input type="password" class="form-input" id="password" name="password"
                placeholder="Enter Your Password" required />
            <div class="toggle-pass"><i class="ri-eye-2-line"></i></div>
        </div>
         <div class="error-container">
        </div>
        <button class="submit-btn" type="submit">Log In</button>
        <div class="signin-text">
            Don't have an account? <a href="./Signup.html">SignUp</a>
        </div>
    </form>

    <footer>
      &copy; 2026 WebCadet SkillApp - Made by Bitan Chakraborty
    </footer>
    <script src="../JsFiles/SignIn.js"></script>
</body>

</html>
