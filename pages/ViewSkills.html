<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../stylesheets/ViewSkills.css">
    <link rel="shortcut icon" href="../assets/logo.jpg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>WebCadet-SkillApp</title>
</head>

<body>

    <!-- Builing the navbar -->
    <header class="header">
        <div class="left-header">
            <div class="logo">
                <img src="../assets/logo.jpg" alt="Logo image">
            </div>
            <div class="header-title">SkillApp</div>
        </div>
        <div class="right-header">
            <ul>
                <li id="dyn-btn">Upload Skills</li>
            </ul>
        </div>
    </header>

    <div class="page-heading">Skills</div>

    <div class="skills-container"><div class="loader-container"><span class="loader"></span></div></div>

    <!-- SignIn alert -->
    <div class="alert-box-container">
      <div class="alert-box">
        <div class="alert-cross"><i class="ri-close-line"></i></div>
        <div class="alert-sign"><i class="ri-spam-line"></i></div>
        <div class="alert-text">
          To upload your skills you need to LogIn first.
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="../JsFiles/ViewSkills.js"></script>
</body>

</html>
