<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../stylesheets/Profile.css">
    <link rel="shortcut icon" href="../assets/logo.jpg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>WebCadet-SkillApp</title>
</head>

<body>

    <!-- Builing the navbar -->
    <header class="header">
        <div class="left-header">
            <div class="logo">
                <img src="../assets/logo.jpg" alt="Logo image">
            </div>
            <div class="header-title">SkillApp</div>
        </div>
        <div class="right-header">
            <ul>
                <li class="home-btn">Home</li>
                <li class="upload-skills">Upload Skills</li>
                <li class="view-skills">View Skills</li>
                <li id="dyn-btn"><span><i class="ri-shut-down-line"></i></span>Log Out</li>
                <li id="menu-btn"><i class="ri-menu-3-line"></i></li>
            </ul>
        </div>
    </header>

    <!-- Building the sidebar -->
    <div class="sidebar">
        <div class="cross-btn">
            <i class="ri-close-line"></i>
        </div>
        <ul>
            <li class="home-btn">Home</li>
            <li class="upload-skills">Upload Skills</li>
            <li class="view-skills">View Skills</li>
            <li id="dyn-btn"><span><i class="ri-shut-down-line"></i></span>Log Out</li>
        </ul>
    </div>

    <div class="page-heading">Profile Data</div>

    <!-- Profile Data section -->
    <div class="data-container page-heading">
        <div class="data-box">
            <div class="data-head">Name:</div>
            <div class="data-content">----------</div>
        </div>
        <div class="data-box">
            <div class="data-head">UserName:</div>
            <div class="data-content">----</div>
        </div>
        <div class="data-box">
            <div class="data-head">Department:</div>
            <div class="data-content">--</div>
        </div>
        <div class="data-box">
            <div class="data-head">No. of Skills:</div>
            <div class="data-content">-/-</div>
        </div>
    </div>

    <footer>
      &copy; 2026 WebCadet SkillApp - Made by Bitan Chakraborty
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="../JsFiles/Profile.js"></script>
</body>

</html>
