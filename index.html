<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="./assets/logo.jpg" type="image/x-icon" />
    <title>Web-Cadet Skill App</title>
  </head>

  <body>
    <!-- Builing the navbar -->
    <header class="header">
      <div class="left-header">
        <div class="logo">
          <img src="./assets/logo.jpg" alt="Logo image" />
        </div>
        <div class="header-title">SkillApp</div>
      </div>
      <div class="right-header">
        <ul>
          <li class="upload-skills">Upload Skills</li>
          <li class="view-skills">View Skills</li>
          <li id="dyn-btn">Log In</li>
          <li id="menu-btn"><i class="ri-menu-3-line"></i></li>
        </ul>
      </div>
    </header>

    <main>
      <section id="name-box"></section>
      <section class="general-statement"></section>
    </main>

    <!-- Building the sidebar -->
    <div class="sidebar">
      <div class="cross-btn">
        <i class="ri-close-line"></i>
      </div>
      <ul>
        <li class="upload-skills">Upload Skills</li>
        <li class="view-skills">View Skills</li>
        <li id="dyn-btn">Log In</li>
      </ul>
    </div>

    <!-- SignIn alert -->
    <div class="alert-box-container">
      <div class="alert-box">
        <div class="alert-cross"><i class="ri-close-line"></i></div>
        <div class="alert-sign"><i class="ri-spam-line"></i></div>
        <div class="alert-text">
          To upload your skills you need to LogIn first.
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
